# =============================================================================
# Family Planner Frontend — Docker Compose (Client Install)
# =============================================================================
# This is the ONLY file clients need to run the frontend.
#
# Quick start:
#   1. cp .env.example .env
#   2. Edit .env: set API_URL to your backend address
#   3. docker compose up -d
#
# To rebuild after API_URL change:
#   docker compose build --no-cache && docker compose up -d
# =============================================================================
version: '3.9'

services:
  frontend:
    build:
      context: ../..             # repo root (needed for frontend/ source)
      dockerfile: deploy/frontend/Dockerfile
      args:
        # The JS bundle is compiled with this URL baked in.
        # Change API_URL in .env and rebuild to point at a different backend.
        VITE_API_URL: ${API_URL:-http://localhost:4000}
    image: family-planner-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      # Optional: expose via Traefik if running alongside it
      - "traefik.enable=true"
      - "traefik.http.routers.fp-frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.fp-frontend.entrypoints=websecure"
      - "traefik.http.routers.fp-frontend.tls.certresolver=letsencrypt"
