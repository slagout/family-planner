# NOTE: This file is a template. ${API_URL} is substituted at container
# startup by docker-entrypoint.sh. All other $variables are nginx variables
# and are intentionally preserved (envsubst only replaces ${API_URL}).

gzip on;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml image/svg+xml;
gzip_vary on;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- API proxy: forward /api/ to backend API server ----
    # API_URL is injected from environment at container startup
    location /api/ {
        proxy_pass ${API_URL}/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ---- Health check endpoint (Docker / load balancer probes) ----
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ---- Static assets: aggressive cache (hashed filenames from Vite) ----
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA fallback: all routes serve index.html ----
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
    }
}
