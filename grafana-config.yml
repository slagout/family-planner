apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'Family Planner'
        orgId: 1
        folder: 'Production'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
# Grafana Dashboard JSON
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-overview
data:
  overview.json: |
    {
      "dashboard": {
        "title": "Family Planner - Overview",
        "timezone": "UTC",
        "panels": [
          {
            "title": "Backend Health",
            "targets": [
              {
                "expr": "up{job=\"backend\"}"
              }
            ]
          },
          {
            "title": "Request Rate",
            "targets": [
              {
                "expr": "rate(backend_requests_total[5m])"
              }
            ]
          },
          {
            "title": "Error Rate",
            "targets": [
              {
                "expr": "rate(backend_errors_total[5m])"
              }
            ]
          },
          {
            "title": "Database Connections",
            "targets": [
              {
                "expr": "pg_stat_activity_count"
              }
            ]
          },
          {
            "title": "Cache Hit Rate",
            "targets": [
              {
                "expr": "redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total)"
              }
            ]
          },
          {
            "title": "Disk Usage",
            "targets": [
              {
                "expr": "1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)"
              }
            ]
          }
        ]
      }
    }
