# =============================================================================
# SonarQube / SonarCloud configuration for family-planner
# TypeScript Node.js backend + React/Vite frontend
# =============================================================================

sonar.projectKey=family-planner
sonar.projectName=Family Planner
sonar.projectVersion=1.0

# Source directories (both services scanned together)
sonar.sources=backend/src,frontend/src

# Test directories (excluded from main analysis, included for coverage)
sonar.tests=backend/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Exclusions — build artifacts, deps, generated files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.d.ts,\
  **/coverage/**,\
  **/migrations/**,\
  frontend/src/vite-env.d.ts

# TypeScript — point at tsconfig files for accurate type info
sonar.typescript.tsconfigPath=backend/tsconfig.json,frontend/tsconfig.json

# Language
sonar.language=ts

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage reports (generated by jest --coverage in CI)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Quality Gate — fail the pipeline if Blocker or Critical issues are introduced
# Configure the actual gate in the SonarQube/SonarCloud UI under:
#   Quality Gates > Create > Add Condition: "New Blocker Issues" > 0
#   Quality Gates > Add Condition: "New Critical Issues" > 0

# Security — flag these patterns specific to this project:
#   - Raw SQL string concatenation (SQLi risk in pg queries)
#   - process.env access without validation
#   - OAuth token logging
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2486
sonar.issue.ignore.multicriteria.e1.resourceKey=**/migrations/**
